<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Hold - Aim Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <style>
    .horizontal-ball {
      top: calc(50% - 20px);
    }
  </style>
</head>
<body>
  {% include 'components/_nav.html' %}

  <main class="game-page">
    <section class="game-header">
      <p class="eyebrow">Tracking challenge</p>
      <h1>Horizontal Hold</h1>
      <p>Stay on target while it moves side to side across the arena.</p>
    </section>

    <section class="game-stage">
      <div id="game-container" class="game-container"></div>

      <div id="score-container" class="score-panel">
        <div id="score" class="score-display">Score: 0</div>
        <div id="timer" class="timer-display">Time: 10</div>
        <button id="start-button" class="start-button">Start</button>
        <button id="try-again-button" class="try-again-button" style="display: none;">Try again</button>
      </div>
    </section>

    {% set record_game = 'horizontalHold' %}
    {% include 'components/_record_panel.html' %}
  </main>

  <script>
    let score = 0;
    let holdScore = 0;
    let intervalId = null;
    let timerInterval = null;
    let scoreInterval = null;
    let position = { x: 230 };
    let gameStarted = false;
    let time = 10;
    let ballElement = null;
    let lastPointerPosition = null;

    const startButton = document.getElementById('start-button');
    const tryAgainButton = document.getElementById('try-again-button');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const gameContainer = document.getElementById('game-container');

    const movePosition = () => {
      const newX = Math.ceil(Math.random() * (gameContainer.clientWidth - 40));
      position.x = newX;
      ballElement.style.left = `${position.x}px`;
    };

    const startGame = () => {
      score = 0;
      holdScore = 0;
      time = 10;
      scoreElement.innerHTML = `Score: ${score}`;
      timerElement.innerHTML = `Time: ${time}`;
      gameStarted = true;
      clearInterval(intervalId);
      clearInterval(timerInterval);
      clearInterval(scoreInterval);
      movePosition();
      intervalId = setInterval(movePosition, Math.random() * 500 + 300);
      scoreInterval = setInterval(trackHoldScore, 75);

      timerInterval = setInterval(() => {
        time--;
        timerElement.innerHTML = `Time: ${time}`;

        if (time <= 0) {
          clearInterval(timerInterval);
          clearInterval(intervalId);
          clearInterval(scoreInterval);
          gameStarted = false;
          tryAgainButton.style.display = 'inline-flex';
          sendScoreToFlask();
        }
      }, 1000);
    };

    const isPointerOnBall = () => {
      if (!lastPointerPosition || !ballElement) {
        return false;
      }

      const ballRect = ballElement.getBoundingClientRect();
      return (
        lastPointerPosition.x >= ballRect.left &&
        lastPointerPosition.x <= ballRect.right &&
        lastPointerPosition.y >= ballRect.top &&
        lastPointerPosition.y <= ballRect.bottom
      );
    };

    const trackHoldScore = () => {
      if (!gameStarted || !isPointerOnBall()) {
        return;
      }

      holdScore++;
      scoreElement.innerHTML = `Score: ${holdScore}`;
    };

    const sendScoreToFlask = () => {
      fetch('/add_score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game: 'horizontalHold', score: holdScore })
      })
      .then(response => response.json())
      .then(data => {
        console.log('Scores updated:', data.scores);
        window.refreshBestRecords?.();
      })
      .catch(error => console.error('Error sending score:', error));
    };

    ballElement = document.createElement('div');
    ballElement.className = 'ball horizontal-ball';
    gameContainer.appendChild(ballElement);
    gameContainer.addEventListener('pointermove', (event) => {
      lastPointerPosition = { x: event.clientX, y: event.clientY };
    });
    gameContainer.addEventListener('pointerleave', () => {
      lastPointerPosition = null;
    });

    startButton.addEventListener('click', () => {
      startGame();
      startButton.style.display = 'none';
    });

    tryAgainButton.addEventListener('click', () => {
      startGame();
      tryAgainButton.style.display = 'none';
      startButton.style.display = 'none';
    });
  </script>
  <script src="{{ url_for('static', filename='js/records.js') }}"></script>
</body>
</html>
