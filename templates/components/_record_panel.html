<section class="record-panel" data-game-record="{{ record_game }}" aria-live="polite">
  <div>
    <p class="eyebrow">Best record</p>
    <h2 data-record-label>Loading record</h2>
  </div>
  <div class="record-card">
    <span class="record-card-label">Top run</span>
    <strong data-record-value>--</strong>
    <span data-record-attempts>Checking scores</span>
  </div>
</section>
