<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Time - Aim Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <style>
    .wait-text {
      display: none;
      margin: 0 0 14px;
      font-weight: 800;
      animation: pulse 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.55; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  {% include 'components/_nav.html' %}

  <main class="game-page">
    <section class="game-header">
      <p class="eyebrow">Reflex challenge</p>
      <h1>Reaction Time</h1>
      <p>Wait for the signal, then click the marker as fast as you can.</p>
    </section>

    <section class="game-stage">
      <div id="wait-text" class="wait-text">Wait for it...</div>
      <button id="start-button" class="button">Start</button>
      <div id="game-container" class="game-box" style="display: none;">
        <div id="reaction-box" class="reaction-box"></div>
      </div>
      <div id="reaction-time" class="reaction-time" style="display: none;">Reaction Time: 0 ms</div>
      <button id="retry-button" class="button" style="display: none;">Try again</button>
    </section>

    {% set record_game = 'reactionTimeTest' %}
    {% include 'components/_record_panel.html' %}
  </main>

  <script>
    let startButton = document.getElementById("start-button");
    let gameContainer = document.getElementById("game-container");
    let reactionBox = document.getElementById("reaction-box");
    let reactionTimeDisplay = document.getElementById("reaction-time");
    let retryButton = document.getElementById("retry-button");
    let waitText = document.getElementById("wait-text");

    let reactionTime = 0;
    let startTime = 0;
    let gameActive = false;
    let timer;
    let reactionTimeout;
    let waitTime = 0;

    const getRandomNumber = (x) => Math.floor(Math.random() * (x - 3) + 3);

    const startGame = () => {
      reactionTime = 0;
      waitTime = getRandomNumber(8);
      gameActive = true;
      clearInterval(timer);
      clearTimeout(reactionTimeout);
      gameContainer.style.display = "block";
      reactionBox.style.display = "none";
      reactionTimeDisplay.style.display = "none";
      waitText.style.display = "block";
      startButton.style.display = "none";
      retryButton.style.display = "none";
      reactionTimeDisplay.textContent = `Reaction Time: ${reactionTime} ms`;

      reactionTimeout = setTimeout(startReaction, waitTime * 1000);
    };

    const startReaction = () => {
      waitText.style.display = "none";
      reactionBox.style.display = "block";
      startTime = Date.now();
      timer = setInterval(updateReactionTime, 10);
    };

    const updateReactionTime = () => {
      if (gameActive) {
        reactionTime = Date.now() - startTime;
        reactionTimeDisplay.textContent = `Reaction Time: ${reactionTime} ms`;
      }
    };

    const stopReaction = () => {
      if (gameActive) {
        clearInterval(timer);
        gameActive = false;
        sendScoreToServer(reactionTime);
        reactionBox.style.display = "none";
        reactionTimeDisplay.style.display = "block";
        retryButton.style.display = "inline-flex";
      }
    };

    const sendScoreToServer = (score) => {
      fetch('/add_score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game: 'reactionTimeTest', score: score })
      })
      .then(response => response.json())
      .then(data => {
        console.log('Score added:', data);
        window.refreshBestRecords?.();
      })
      .catch((error) => console.error('Error:', error));
    };

    startButton.addEventListener("click", startGame);
    reactionBox.addEventListener("click", stopReaction);
    retryButton.addEventListener("click", startGame);
  </script>
  <script src="{{ url_for('static', filename='js/records.js') }}"></script>
</body>
</html>
