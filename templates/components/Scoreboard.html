<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoreboard - Aim Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  {% include 'components/_nav.html' %}

  <main class="game-page">
    <section class="game-header">
      <p class="eyebrow">Community rankings</p>
      <h1>Scoreboard</h1>
      <p>Track the latest scores and compare your run against the lobby.</p>
    </section>

    <section class="game-stage">
      <canvas id="scoreChart" aria-label="Ranking chart"></canvas>
    </section>
  </main>

  <script>
    const rankings = {
      reactionTimeTest: [150, 200, 250, 300, 350],
      clicksPerSecond: [1.5, 2.0, 2.5, 3.0, 3.5],
      shootTest: [5, 10, 15, 20, 25]
    };

    const actual = 'reactionTimeTest';

    const filteredRankings = rankings[actual].map((score, index) => ({
      name: `#${index + 1}`,
      score
    }));

    const ctx = document.getElementById('scoreChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: filteredRankings.map((ranking) => ranking.name),
        datasets: [{
          label: 'Score',
          data: filteredRankings.map((ranking) => ranking.score),
          borderColor: '#23c7d9',
          backgroundColor: 'rgba(35, 199, 217, 0.16)',
          borderWidth: 3,
          pointBackgroundColor: '#9bea56',
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.35,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            ticks: { color: '#9fb2bf' },
            grid: { color: 'rgba(232, 245, 255, 0.08)' }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#9fb2bf' },
            grid: { color: 'rgba(232, 245, 255, 0.08)' }
          }
        },
        plugins: {
          legend: {
            labels: { color: '#eef6fb' }
          },
          tooltip: {
            callbacks: {
              title: function(tooltipItem) {
                return 'Ranking ' + tooltipItem[0].label;
              }
            }
          }
        }
      }
    });
  </script>
</body>
</html>
