<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Speed - Aim Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <script>
    let clicks = 0;
    let time = -1;
    let timer;

    function startGame() {
      clicks = 0;
      time = 10;
      document.getElementById("game-box").textContent = time;
      document.getElementById("retry-button").style.display = "none";

      clearInterval(timer);
      timer = setInterval(() => {
        time--;
        if (time === 0) {
          clearInterval(timer);
          const score = clicks / 10;
          document.getElementById("game-box").textContent = `Clicks per second: ${score.toFixed(2)}`;
          document.getElementById("retry-button").style.display = "inline-flex";
          saveScore(score.toFixed(2));
        } else {
          document.getElementById("game-box").textContent = time;
        }
      }, 1000);
    }

    function handleClick() {
      if (time > 0) {
        clicks++;
      }
    }

    function initializeGame() {
      document.getElementById("game-box").addEventListener("click", handleClick);
      document.getElementById("start-button").style.display = "none";
      startGame();
    }

    function saveScore(score) {
      fetch("/add_score", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ game: "clicksPerSecond", score: score }),
      })
      .then((response) => response.json())
      .then((data) => {
        console.log("Score saved:", data);
        window.refreshBestRecords?.();
      })
      .catch((error) => console.error("Error saving score:", error));
    }
  </script>
</head>
<body>
  {% include 'components/_nav.html' %}

  <main class="game-page">
    <section class="game-header">
      <p class="eyebrow">Speed challenge</p>
      <h1>Click Speed</h1>
      <p>Click inside the arena as many times as you can before the countdown hits zero.</p>
    </section>

    <section class="game-stage">
      <div id="game-box" class="box">Ready?</div>
      <div class="score-panel">
        <button id="start-button" class="button" onclick="initializeGame()">Start</button>
        <button id="retry-button" class="button" onclick="startGame()" style="display: none;">Try again</button>
      </div>
    </section>

    {% set record_game = 'clicksPerSecond' %}
    {% include 'components/_record_panel.html' %}
  </main>
  <script src="{{ url_for('static', filename='js/records.js') }}"></script>
</body>
</html>
