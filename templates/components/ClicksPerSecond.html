<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Per Second</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background-color: #2c2c2c;
        }

        .container {
            margin-top: 50px;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            color: #1a73e8;
        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            background-color: #4caf50;
            width: 500px;
            height: 300px;
            margin: 20px auto;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            user-select: none;
            cursor: pointer;
        }

        .button {
            background-color: #1a73e8;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #1765c1;
        }
    </style>
    <script>
        let clicks = 0;
        let time = -1;
        let timer;
        let gameActive = false;

        function startGame() {
            clicks = 0;
            time = 10;
            document.getElementById("game-box").textContent = time;
            document.getElementById("retry-button").style.display = "none";

            timer = setInterval(() => {
                time--;
                if (time === 0) {
                    clearInterval(timer);
                    const score = clicks / 10;
                    document.getElementById("game-box").textContent = `Clicks per second: ${score.toFixed(2)}`;
                    document.getElementById("retry-button").style.display = "block";
                } else {
                    document.getElementById("game-box").textContent = time;
                }
            }, 1000);
        }

        function handleClick() {
            if (time > 0) {
                clicks++;
            }
        }

        function initializeGame() {
            document.getElementById("game-box").addEventListener("click", handleClick);
            document.getElementById("start-button").style.display = "none";
            startGame();
        }
    </script>
</head>
<body>
    <div class="container">
        <h1 class="title">Click per second</h1>
        <div id="game-box" class="box"></div>
        <button id="start-button" class="button" onclick="initializeGame()">Start</button>
        <button id="retry-button" class="button" onclick="startGame()" style="display: none;">Try again!</button>
    </div>
</body>
</html>
