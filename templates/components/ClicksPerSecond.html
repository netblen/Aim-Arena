<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Per Second</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background-color: #2c2c2c;
        }

        .container {
            margin-top: 50px;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            color: #1a73e8;
        }

        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: white;
            background-color: #4caf50;
            width: 500px;
            height: 300px;
            margin: 20px auto;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            user-select: none;
            cursor: pointer;
        }

        .button {
            background-color: #1a73e8;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        .button:hover {
            background-color: #1765c1;
        }
    </style>
    <script>
        let clicks = 0;
        let time = -1;
        let timer;
        let gameActive = false;

        // Function to start the game
        function startGame() {
            clicks = 0;  // Reset clicks to 0 when the game starts
            time = 10;   // Set the timer to 10 seconds
            document.getElementById("game-box").textContent = time; // Show the timer
            document.getElementById("retry-button").style.display = "none"; // Hide retry button initially

            // Start the countdown timer
            timer = setInterval(() => {
                time--;
                if (time === 0) {
                    clearInterval(timer);  // Stop the timer
                    const score = clicks / 10; // Calculate score (clicks per second)
                    document.getElementById("game-box").textContent = `Clicks per second: ${score.toFixed(2)}`; // Show score
                    document.getElementById("retry-button").style.display = "block"; // Show retry button
                } else {
                    document.getElementById("game-box").textContent = time; // Update timer
                }
            }, 1000);
        }

        // Function to handle clicks during the game
        function handleClick() {
            if (time > 0) {  // Only count clicks if the timer is running
                clicks++;  // Increase the click counter
            }
        }

        // Event listener for the start button
        function initializeGame() {
            document.getElementById("game-box").addEventListener("click", handleClick);
            document.getElementById("start-button").style.display = "none"; // Hide the start button after it is clicked
            startGame();  // Start the game when the user clicks the start button
        }
    </script>
</head>
<body>
    <div class="container">
        <h1 class="title">Click per second</h1>
        <div id="game-box" class="box">     </div>
        <button id="start-button" class="button" onclick="initializeGame()">Start</button>
        <button id="retry-button" class="button" onclick="startGame()" style="display: none;">Try again!</button>
    </div>
</body>
</html>
