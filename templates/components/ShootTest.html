<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoot Test - Aim Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
  {% include 'components/_nav.html' %}

  <main class="game-page">
    <section class="game-header">
      <p class="eyebrow">Aim challenge</p>
      <h1>Shoot Test</h1>
      <p>Hit the target as many times as possible in 10 seconds.</p>
    </section>

    <section class="game-stage">
      <div id="game-container" class="game-container"></div>
      <div class="score-panel">
        <div id="info">Ready to queue?</div>
        <button id="start-button" class="button">Start</button>
      </div>
    </section>

    {% set record_game = 'shootTest' %}
    {% include 'components/_record_panel.html' %}
  </main>

  <script>
    let time = -1;
    let clicks = 0;
    let timerInterval;
    let position = { x: 230, y: 130 };

    const gameContainer = document.getElementById("game-container");
    const startButton = document.getElementById("start-button");
    const info = document.getElementById("info");

    function updateTargetPosition() {
      const newX = Math.random() * (gameContainer.clientWidth - 20);
      const newY = Math.random() * (gameContainer.clientHeight - 20);
      position = { x: newX, y: newY };

      const target = document.querySelector(".target");
      if (target) {
        target.style.left = `${position.x}px`;
        target.style.top = `${position.y}px`;
      }
    }

    function startGame() {
      clicks = 0;
      time = 10;
      startButton.style.display = "none";
      info.innerHTML = "Time remaining: 10s";
      clearInterval(timerInterval);

      const target = document.createElement("div");
      target.classList.add("target");
      target.style.left = `${position.x}px`;
      target.style.top = `${position.y}px`;
      target.onclick = () => {
        clicks++;
        updateTargetPosition();
      };

      gameContainer.innerHTML = "";
      gameContainer.appendChild(target);

      timerInterval = setInterval(() => {
        time--;
        if (time === 0) {
          endGame();
        } else if (time > 0) {
          info.innerHTML = `Time remaining: ${time}s`;
        }
      }, 1000);
    }

    function endGame() {
      clearInterval(timerInterval);
      gameContainer.innerHTML = "";
      startButton.style.display = "inline-flex";
      info.innerHTML = `Shots landed: ${clicks}`;

      fetch("/add_score", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ game: "shootTest", score: clicks }),
      }).then((response) => response.json())
        .then((data) => {
          console.log("Score saved:", data);
          window.refreshBestRecords?.();
        })
        .catch((error) => console.error("Error saving score:", error));
    }

    startButton.onclick = startGame;
  </script>
  <script src="{{ url_for('static', filename='js/records.js') }}"></script>
</body>
</html>
