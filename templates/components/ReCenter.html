<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Re-center - Aim Arena</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
  {% include 'components/_nav.html' %}

  <main class="game-page">
    <section class="game-header">
      <p class="eyebrow">Control challenge</p>
      <h1>Re-center</h1>
      <p>Click the target, return to center, and repeat as fast as your control allows.</p>
    </section>

    <section class="game-stage">
      <div id="content"></div>
    </section>

    {% set record_game = 'recenter' %}
    {% include 'components/_record_panel.html' %}
  </main>

  <script>
    let clicks = 0;
    let time = 15;
    let timer;
    let center = true;
    const ballSize = 20;

    function startGame() {
      clicks = 0;
      time = 15;
      center = true;
      clearInterval(timer);

      updateGameArea();
      startTimer();
    }

    function handleClick() {
      clicks++;
      center = !center;
      updateGameArea();
    }

    function startTimer() {
      timer = setInterval(() => {
        time--;
        if (time <= 0) {
          clearInterval(timer);
          endGame();
        } else {
          updateInfo();
        }
      }, 1000);
    }

    function endGame() {
      document.getElementById('content').innerHTML = `
        <div class="score-panel">
          <h2>Game over</h2>
          <p class="score-display">Score: ${clicks}</p>
          <button class="retry-btn" onclick="startGame()">Try again</button>
        </div>
      `;
      saveScore();
    }

    function saveScore() {
      fetch('/add_score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game: 'recenter', score: clicks }),
      })
      .then(response => response.json())
      .then(data => {
        console.log('Score saved:', data);
        window.refreshBestRecords?.();
      })
      .catch(error => console.error('Error saving score:', error));
    }

    function getBallPosition() {
      const gameArea = document.querySelector('.game-area');
      const width = gameArea ? gameArea.clientWidth : 500;
      const height = gameArea ? gameArea.clientHeight : 300;

      if (center) {
        return {
          x: (width - ballSize) / 2,
          y: (height - ballSize) / 2,
        };
      }

      return {
        x: Math.random() * (width - ballSize),
        y: Math.random() * (height - ballSize),
      };
    }

    function updateGameArea() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="game-area">
          <div class="ball" onclick="handleClick()"></div>
        </div>
        <div class="score-panel">
          <p id="info">Time: ${time}s | Score: ${clicks}</p>
        </div>
      `;

      const ball = document.querySelector('.ball');
      const position = getBallPosition();
      ball.style.left = `${position.x}px`;
      ball.style.top = `${position.y}px`;
    }

    function updateInfo() {
      document.getElementById('info').innerText = `Time: ${time}s | Score: ${clicks}`;
    }

    document.getElementById('content').innerHTML = `
      <div class="score-panel">
        <button class="start-btn" onclick="startGame()">Start Game</button>
      </div>
    `;
  </script>
  <script src="{{ url_for('static', filename='js/records.js') }}"></script>
</body>
</html>
